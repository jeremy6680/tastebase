# =============================================================================
# TasteBase — Docker Compose (local development)
#
# Services:
#   api    FastAPI backend (port 8000) — the only DuckDB writer
#   agent  Chainlit + LangGraph UI (port 8080)
#
# For production deployment, use the per-service compose files:
#   docker/api/docker-compose.yml   → Coolify app: tastebase-api
#   docker/agent/docker-compose.yml → Coolify app: tastebase-agent
#
# The Vue frontend is deployed separately on Netlify (static build).
#
# Quick start:
#   cp .env.example .env
#   docker compose up --build
# =============================================================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: >
      uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 1
    ports:
      - "8000:8000"
    volumes:
      - duckdb_data:/app/data
      - ./data/raw:/app/data/raw
      - ./transform:/app/transform
    environment:
      DUCKDB_PATH: /app/data/warehouse.duckdb
      APP_ENV: development
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request;
            urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: chainlit run agent/app.py --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    environment:
      API_BASE_URL: http://api:8000
      APP_ENV: development
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  duckdb_data:
    driver: local
