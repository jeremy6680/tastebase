# =============================================================================
# TasteBase — dbt connection profile
# Uses DuckDB via dbt-duckdb. Path read from environment variable.
# =============================================================================

tastebase:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', 'data/warehouse.duckdb') }}"
      threads: 4

    prod:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', 'data/warehouse.duckdb') }}"
      threads: 4
